<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yingrui Hou | Resume</title>
    <meta
      name="description"
      content="Resume of Yingrui Hou, numerical engineer and data scientist with a PhD in experimental particle physics."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&amp;family=Space+Grotesk:wght@400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="resume-page">
    <div class="resume-shell">
      <header class="resume-header">
        <div>
          <p class="eyebrow" id="resume-eyebrow">Resume</p>
          <div class="resume-name-row">
            <h1 id="resume-name">Yingrui Hou</h1>
            <button
              class="name-audio-button"
              type="button"
              aria-label="Play name pronunciation"
              title="Play name pronunciation"
              id="name-audio-button"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 9.5A1.5 1.5 0 0 1 5.5 8H9l4.18-3.35A1 1 0 0 1 14.8 5.43v13.14a1 1 0 0 1-1.62.78L9 16H5.5A1.5 1.5 0 0 1 4 14.5Zm12.73-2.52a.75.75 0 0 1 1.04.2 8.1 8.1 0 0 1 0 9.64.75.75 0 1 1-1.24-.84 6.6 6.6 0 0 0 0-7.96.75.75 0 0 1 .2-1.04m2.57-2.44a.75.75 0 0 1 1.05.14 12.21 12.21 0 0 1 0 14.64.75.75 0 1 1-1.19-.92 10.71 10.71 0 0 0 0-12.8.75.75 0 0 1 .14-1.06" />
              </svg>
            </button>
            <audio id="name-audio" preload="metadata">
              <source id="name-audio-source" src="" type="audio/mpeg" />
            </audio>
          </div>
          <p class="resume-location" id="resume-location"></p>
        </div>
        <div class="resume-header-actions">
          <div class="resume-links">
            <a href="index.html" id="back-home-link">Back to Homepage</a>
          </div>
          <div class="resume-flag-switcher" aria-label="Language switcher">
            <button class="lang-flag is-active" type="button" data-lang-btn="en" aria-label="English CV" title="English CV">🇬🇧</button>
            <button class="lang-flag" type="button" data-lang-btn="fr" aria-label="CV en français" title="CV en français">🇫🇷</button>
          </div>
        </div>
      </header>

      <section class="resume-card resume-summary" id="resume-summary"></section>

      <div class="resume-grid">
        <aside class="resume-sidebar">
          <section class="resume-card">
            <p class="sidebar-label" id="contact-label">Contact</p>
            <div class="contact-list" id="resume-contact"></div>
          </section>

          <section class="resume-card">
            <p class="sidebar-label" id="education-label">Education</p>
            <div class="resume-markdown resume-sidebar-markdown" id="resume-education"></div>
          </section>

          <section class="resume-card">
            <p class="sidebar-label" id="skills-label">Skills</p>
            <div class="resume-markdown resume-sidebar-markdown" id="resume-skills"></div>
          </section>

          <section class="resume-card">
            <p class="sidebar-label" id="languages-label">Languages</p>
            <div class="resume-markdown resume-sidebar-markdown" id="resume-languages"></div>
          </section>
        </aside>

        <main class="resume-main">
          <section class="resume-card">
            <p class="sidebar-label" id="highlights-label">Technical Highlights</p>
            <div class="resume-markdown resume-main-markdown" id="resume-highlights"></div>
          </section>

          <section class="resume-card">
            <p class="sidebar-label" id="experience-label">Professional Experience</p>
            <div class="resume-markdown resume-main-markdown" id="resume-experience"></div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="assets/js/resume-page.js"></script>
  </body>
</html>
